name: Build and Release CardX Email Gen

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # รันเมื่อมีการสร้าง tag เช่น v1.0.0
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # สำคัญมากเพื่อให้สร้าง Release ได้

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Compile Executable
        run: bun build --compile --minify --outfile cardx-email-gen.exe ./src/index.ts

      # ขั้นตอนใหม่: รวมไฟล์เป็น Zip
      - name: Create Distribution Package
        shell: pwsh
        run: |
          # Copy README มาเป็น .txt เพื่อให้เปิดง่ายบน Windows
          Copy-Item "README.md" "README.txt"
          # บีบอัดไฟล์ .exe และ README.txt เข้าด้วยกัน
          Compress-Archive -Path "cardx-email-gen.exe", "README.txt" -DestinationPath "CardX-Email-Generator.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CardX-Email-Generator.zip # เปลี่ยนไปอัปโหลดไฟล์ Zip แทน
          generate_release_notes: true